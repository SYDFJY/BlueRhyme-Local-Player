<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none}
html,body{height:100%;overflow:hidden;background:transparent;-webkit-app-region:drag}
#app{position:relative;height:100%;background:rgba(0,0,0,0.35);border-radius:8px;overflow:hidden}
#drag-hint{position:absolute;top:4px;left:50%;transform:translateX(-50%);font-size:10px;color:rgba(255,255,255,0.2);pointer-events:none;z-index:10;transition:opacity .6s}
#lyric{height:100%;overflow-y:auto;padding:22px 12px 8px;scroll-behavior:smooth;-webkit-app-region:no-drag}
#lyric::-webkit-scrollbar{width:3px}
#lyric::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:2px}
#lyric::-webkit-scrollbar-track{background:transparent}
.line{padding:3px 8px;font-size:14px;color:rgba(255,255,255,0.25);transition:all .3s ease;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center;line-height:1.6;border-radius:4px;cursor:pointer;-webkit-app-region:no-drag}
.line.active{font-size:18px;font-weight:700;color:#4d94ff;text-shadow:0 0 20px rgba(77,148,255,0.4);padding:5px 8px}
.line.near{color:rgba(255,255,255,0.5)}
.line.past{opacity:.12}
.empty{color:rgba(255,255,255,0.15);font-size:14px;text-align:center;padding-top:40%;-webkit-app-region:no-drag}
#ctx{display:none;position:fixed;background:rgba(20,20,40,0.96);border:1px solid rgba(255,255,255,0.12);border-radius:6px;padding:4px 0;min-width:175px;box-shadow:0 6px 20px rgba(0,0,0,0.6);z-index:999;-webkit-app-region:no-drag}
#ctx div{padding:7px 16px;font-size:12px;color:#bbb;cursor:pointer;white-space:nowrap}
#ctx div:hover{background:rgba(77,148,255,0.2);color:#4d94ff}
#ctx .sep{height:1px;background:rgba(255,255,255,0.06);margin:3px 0;padding:0;cursor:default}
#ctx .sep:hover{background:rgba(255,255,255,0.06)}
#submenu{display:none;position:fixed;background:rgba(20,20,40,0.96);border:1px solid rgba(255,255,255,0.12);border-radius:6px;padding:4px 0;min-width:140px;box-shadow:0 6px 20px rgba(0,0,0,0.6);z-index:1000;-webkit-app-region:no-drag}
#submenu div{padding:7px 16px;font-size:12px;color:#bbb;cursor:pointer;white-space:nowrap}
#submenu div:hover{background:rgba(77,148,255,0.2);color:#4d94ff}
#submenu .sep{height:1px;background:rgba(255,255,255,0.06);margin:3px 0;padding:0;cursor:default}
#submenu .sep:hover{background:rgba(255,255,255,0.06)}
#submenu .sub-trigger{position:relative}
#submenu .sub-trigger::after{content:'▸';float:right;margin-left:12px;font-size:10px;color:#666}
#size-handle{position:absolute;bottom:0;right:0;width:16px;height:16px;cursor:nwse-resize;-webkit-app-region:no-drag;z-index:10}
#size-handle::after{content:'';position:absolute;bottom:3px;right:3px;width:8px;height:8px;border-right:2px solid rgba(255,255,255,0.2);border-bottom:2px solid rgba(255,255,255,0.2)}
#toast{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.8);color:#fff;padding:8px 18px;border-radius:6px;font-size:13px;z-index:9999;pointer-events:none;transition:opacity .3s}
.color-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;vertical-align:middle}
</style>
</head>
<body>
<div id="app">
  <div id="drag-hint">⋮⋮ 拖拽移动 ⋮⋮</div>
  <div id="lyric"><div class="empty">🎵 暂无歌词</div></div>
  <div id="size-handle"></div>
</div>
<div id="ctx">
  <div data-a="copy">📋 复制当前歌词</div>
  <div data-a="copy-all">📄 复制全部歌词</div>
  <div class="sep"></div>
  <div data-a="font-sub" class="sub-trigger">🔤 字号设置 ▸</div>
  <div data-a="color-sub" class="sub-trigger">🎨 歌词颜色 ▸</div>
  <div class="sep"></div>
  <div data-a="fs-">A- 字号减小</div>
  <div data-a="fs+">A+ 字号增大</div>
  <div class="sep"></div>
  <div data-a="bg-">透明度 -</div>
  <div data-a="bg+">透明度 +</div>
  <div class="sep"></div>
  <div data-a="lock">🔒 锁定/解锁位置</div>
  <div data-a="pin">📌 置顶切换</div>
  <div class="sep"></div>
  <div data-a="save">💾 保存歌词到文件</div>
  <div data-a="reset">🔄 重置所有设置</div>
  <div class="sep"></div>
  <div data-a="close">✕ 关闭歌词</div>
</div>
<div id="submenu"></div>
<div id="toast"></div>
<script>
const{ipcRenderer}=require('electron')
const $=s=>document.querySelector(s)
const lyric=$('#lyric'),ctx=$('#ctx'),submenu=$('#submenu'),app=$('#app'),hint=$('#drag-hint'),toast=$('#toast')
let lines=[],fontSize=14,bgAlpha=0.35,pinned=true,locked=false,lyricColor='#4d94ff',activeIdx=-1
let subType=null

// ===== 持久化设置 =====
function loadSettings(){
  try{
    const s=JSON.parse(localStorage.getItem('lyric_window_settings')||'{}')
    if(s.fontSize) fontSize=s.fontSize
    if(s.bgAlpha!==undefined) bgAlpha=s.bgAlpha
    if(s.lyricColor) lyricColor=s.lyricColor
    if(s.locked!==undefined) locked=s.locked
    app.style.background=`rgba(0,0,0,${bgAlpha})`
    applyFont()
    applyColor()
  }catch{}
}
function saveSettings(){
  try{localStorage.setItem('lyric_window_settings',JSON.stringify({fontSize,bgAlpha,lyricColor,locked}))}catch{}
}

// Hide drag hint
hint.style.opacity='1'
setTimeout(()=>{hint.style.transition='opacity 1.5s';hint.style.opacity='0'},3000)
setTimeout(()=>{hint.remove()},5000)

// ===== 歌词更新 =====
ipcRenderer.on('lyric:update',(_,d)=>{
  if(!d||!d.lines){lyric.innerHTML='<div class="empty">🎵 暂无歌词</div>';lines=[];return}
  lines=d.lines
  lyric.innerHTML=lines.map((l,i)=>`<div class="line" data-i="${i}">${l.text||l}</div>`).join('')
  applyFont();applyColor()
  if(d.currentIdx>=0) setActive(d.currentIdx)
})
ipcRenderer.on('lyric:index',(_,i)=>setActive(i))

function setActive(idx){
  activeIdx=idx
  const els=lyric.querySelectorAll('.line')
  els.forEach((el,i)=>{
    el.className='line'
    if(i===idx) el.classList.add('active')
    else if(i>idx&&i-idx<=2) el.classList.add('near')
    else if(i<idx) el.classList.add('past')
  })
  const active=lyric.querySelector('.line.active')
  if(active){
    const ch=lyric.clientHeight,ot=active.offsetTop,oh=active.offsetHeight
    lyric.scrollTo({top:ot-ch/2+oh/2,behavior:'smooth'})
  }
}

function applyFont(){
  lyric.querySelectorAll('.line').forEach(el=>el.style.fontSize=fontSize+'px')
  const a=lyric.querySelector('.line.active')
  if(a) a.style.fontSize=(fontSize+4)+'px'
}

// ===== 颜色：直接修改行内样式 =====
function hexToRgba(hex,alpha){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16)
  return `rgba(${r},${g},${b},${alpha})`
}
function applyColor(){
  lyric.querySelectorAll('.line.active').forEach(el=>{
    el.style.color=lyricColor
    el.style.textShadow=`0 0 20px ${hexToRgba(lyricColor,0.4)}`
  })
}

// ===== 主菜单 =====
document.addEventListener('contextmenu',e=>{
  e.preventDefault()
  hideSub()
  ctx.style.display='block'
  const cw=ctx.offsetWidth,ch=ctx.offsetHeight,winW=window.innerWidth,winH=window.innerHeight
  let x=e.clientX,y=e.clientY
  if(y+ch>winH) y=Math.max(2,y-ch-4)
  if(x+cw>winW) x=winW-cw-4
  if(x<2) x=2; if(y<2) y=2
  ctx.style.left=x+'px'; ctx.style.top=y+'px'
})

document.addEventListener('click',e=>{
  if(!ctx.contains(e.target)&&!submenu.contains(e.target)){ctx.style.display='none';hideSub()}
})

function showToast(msg,dur=1500){
  toast.textContent=msg;toast.style.display='block';toast.style.opacity='1'
  setTimeout(()=>{toast.style.opacity='0';setTimeout(()=>{toast.style.display='none'},300)},dur)
}

// ===== 子菜单 =====
const FONT_SUB=[
  {a:'fs10',label:'10px 小'},{a:'fs12',label:'12px'},{a:'fs14',label:'14px 默认'},
  {a:'fs16',label:'16px'},{a:'fs18',label:'18px 大'},{a:'fs22',label:'22px 超大'},{a:'fs28',label:'28px 巨大'}
]
const COLOR_SUB=[
  {a:'color-blue',label:'蓝色 (默认)',hex:'#4d94ff'},
  {a:'color-green',label:'绿色',hex:'#4dff88'},
  {a:'color-red',label:'红色',hex:'#ff4d6a'},
  {a:'color-purple',label:'紫色',hex:'#b44dff'},
  {a:'color-orange',label:'橙色',hex:'#ff9f43'},
  {a:'color-white',label:'白色',hex:'#ffffff'},
  {a:'color-gold',label:'金色',hex:'#ffd700'}
]

function hideSub(){submenu.style.display='none';subType=null}

function showSub(type,anchorEl){
  const rect=anchorEl.getBoundingClientRect()
  const items=type==='font'?FONT_SUB:COLOR_SUB
  submenu.innerHTML=items.map(it=>{
    if(type==='color'){
      return `<div data-a="${it.a}"><span class="color-dot" style="background:${it.hex}"></span>${it.label}</div>`
    }
    return `<div data-a="${it.a}">${it.label}</div>`
  }).join('')
  // 显示后计算位置
  submenu.style.display='block'
  submenu.style.left='0px';submenu.style.top='0px'
  const sw=submenu.offsetWidth,sh=submenu.offsetHeight
  const winW=window.innerWidth,winH=window.innerHeight
  let x=rect.right+2,y=rect.top
  if(x+sw>winW) x=rect.left-sw-2
  if(x<2) x=2
  if(y+sh>winH) y=winH-sh-2
  if(y<2) y=2
  submenu.style.left=x+'px';submenu.style.top=y+'px'
  subType=type
}

// ===== 主菜单点击 =====
ctx.addEventListener('click',e=>{
  const a=e.target.dataset.a; if(!a) return
  // 子菜单触发项
  if(a==='font-sub'){showSub('font',e.target);return}
  if(a==='color-sub'){showSub('color',e.target);return}
  ctx.style.display='none';hideSub()
  handleAction(a)
})

// ===== 子菜单点击 =====
submenu.addEventListener('click',e=>{
  const el=e.target.closest('[data-a]')
  if(!el) return
  const a=el.dataset.a
  if(!a) return
  submenu.style.display='none'
  handleAction(a)
})

function handleAction(a){
  if(a==='close') ipcRenderer.send('lyric:close')

  else if(a==='fs+'){fontSize=Math.min(28,fontSize+2);applyFont();saveSettings();showToast('字号: '+fontSize+'px')}
  else if(a==='fs-'){fontSize=Math.max(10,fontSize-2);applyFont();saveSettings();showToast('字号: '+fontSize+'px')}
  else if(a.startsWith('fs')&&a!=='fs-'&&a!=='fs+'){
    fontSize=parseInt(a.replace('fs',''));applyFont();saveSettings();showToast('字号: '+fontSize+'px')
  }

  else if(a==='bg+'){bgAlpha=Math.min(0.9,+(bgAlpha+0.1).toFixed(1));app.style.background=`rgba(0,0,0,${bgAlpha})`;saveSettings();showToast('透明度: '+Math.round(bgAlpha*100)+'%')}
  else if(a==='bg-'){bgAlpha=Math.max(0.05,+(bgAlpha-0.1).toFixed(1));app.style.background=`rgba(0,0,0,${bgAlpha})`;saveSettings();showToast('透明度: '+Math.round(bgAlpha*100)+'%')}

  else if(a==='pin'){pinned=!pinned;ipcRenderer.send('lyric:click-through',!pinned);app.style.opacity=pinned?'1':'0.6';showToast(pinned?'已置顶':'已取消置顶')}
  else if(a==='lock'){
    locked=!locked;ipcRenderer.send('lyric:click-through',locked);app.style.opacity=locked?'0.85':'1'
    showToast(locked?'位置已锁定':'位置已解锁');saveSettings()
  }

  else if(a==='copy'){
    const active=lyric.querySelector('.line.active')
    if(active){navigator.clipboard.writeText(active.textContent);showToast('已复制当前歌词')}
    else{showToast('暂无活跃歌词')}
  }
  else if(a==='copy-all'){
    const allText=lines.map(l=>l.text||l).join('\n')
    if(allText){navigator.clipboard.writeText(allText);showToast('已复制全部歌词 ('+lines.length+'行)')}
    else{showToast('暂无歌词')}
  }

  else if(a.startsWith('color-')){
    const colorMap={blue:'#4d94ff',green:'#4dff88',red:'#ff4d6a',purple:'#b44dff',orange:'#ff9f43',white:'#ffffff',gold:'#ffd700'}
    lyricColor=colorMap[a.replace('color-','')]||'#4d94ff'
    applyColor();saveSettings();showToast('颜色已切换')
  }

  else if(a==='save'){
    if(lines.length===0){showToast('暂无歌词可保存');return}
    const allText=lines.map(l=>{
      const t=l.time?`[${Math.floor(l.time/60).toString().padStart(2,'0')}:${(l.time%60).toFixed(2).padStart(5,'0')}]`:''
      return t+(l.text||l)
    }).join('\n')
    ipcRenderer.send('lyric:save-to-file',allText)
    showToast('正在保存歌词文件...')
  }

  else if(a==='reset'){
    fontSize=14;bgAlpha=0.35;lyricColor='#4d94ff';locked=false
    app.style.background=`rgba(0,0,0,${bgAlpha})`
    ipcRenderer.send('lyric:click-through',false)
    applyFont();applyColor();saveSettings()
    showToast('所有设置已重置')
  }
}

// ===== 双击歌词行跳转 =====
lyric.addEventListener('dblclick',e=>{
  const el=e.target.closest('.line')
  if(!el) return
  const idx=parseInt(el.dataset.i)
  if(!isNaN(idx)&&lines[idx]&&lines[idx].time!==undefined){
    ipcRenderer.send('lyric:seek',lines[idx].time)
  }
})

// ===== ESC =====
document.addEventListener('keydown',e=>{if(e.key==='Escape'){ipcRenderer.send('lyric:close')}})

// ===== 加载设置 =====
loadSettings()
</script>
</body>
</html>
